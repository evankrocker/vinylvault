<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Vault — My Record Collection</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<style>
  .artwork-wrap { position:relative; aspect-ratio:1; overflow:hidden; background:#e9ecef; }
  .artwork-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .artwork-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#dee2e6; }
  .artwork-placeholder i { font-size:3rem; color:#adb5bd; }
  .card { transition:box-shadow 0.15s, transform 0.15s; }
  .record-card { cursor:pointer; }
  .record-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.15)!important; transform:translateY(-2px); }
  .card-actions { position:absolute; top:0.4rem; right:0.4rem; display:flex; gap:0.25rem; opacity:0; transition:opacity 0.15s; }
  .record-card:hover .card-actions { opacity:1; }
  .grid-view { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:1rem; }
  .browse-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }
  .list-thumb { width:52px; height:52px; object-fit:cover; border-radius:4px; flex-shrink:0; }
  .list-thumb-placeholder { width:52px; height:52px; border-radius:4px; background:#dee2e6; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .artwork-preview { width:100%; aspect-ratio:1; object-fit:cover; border-radius:4px; border:1px solid #dee2e6; display:none; margin-top:0.5rem; }
  .artwork-preview.show { display:block; }
  .empty-icon { font-size:5rem; color:#adb5bd; }
  #sync-status { font-size:0.75rem; }
  #discogs-results { max-height:260px; overflow-y:auto; }
  .discogs-result { display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0.75rem; cursor:pointer; border-bottom:1px solid #f0f0f0; transition:background 0.1s; }
  .discogs-result:last-child { border-bottom:none; }
  .discogs-result:hover { background:#f8f9fa; }
  .discogs-result img { width:48px; height:48px; object-fit:cover; border-radius:3px; flex-shrink:0; background:#dee2e6; }
  .discogs-result .meta { flex:1; min-width:0; }
  .discogs-result .meta strong { display:block; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .discogs-result .meta span { font-size:0.75rem; color:#6c757d; }
  /* Browse cards */
  .browse-card { cursor:pointer; }
  .browse-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.15)!important; transform:translateY(-2px); }
  .browse-mosaic { display:grid; grid-template-columns:1fr 1fr; gap:2px; aspect-ratio:1; overflow:hidden; border-radius:4px 4px 0 0; background:#dee2e6; }
  .browse-mosaic img { width:100%; height:100%; object-fit:cover; display:block; }
  .browse-mosaic .blank { background:#dee2e6; display:flex; align-items:center; justify-content:center; }
  .browse-mosaic .blank i { color:#adb5bd; font-size:1.5rem; }
  /* Page sections */
  .page { display:none; }
  .page.active { display:block; }
  /* Navbar tabs */
  .nav-tabs .nav-link { cursor:pointer; }
  .clickable-artist { cursor:pointer; color:#0d6efd; text-decoration:none; }
  .clickable-artist:hover { text-decoration:underline; }
  .clickable-badge { cursor:pointer; }
  .clickable-badge:hover { opacity:0.85; }
  /* Navbar icon links */
  .navbar-nav .nav-link { border-bottom:3px solid transparent; transition:border-color 0.15s, opacity 0.15s; opacity:0.75; border-radius:0; }
  .navbar-nav .nav-link:hover { opacity:1; border-bottom-color:rgba(255,255,255,0.4); }
  .navbar-nav .nav-link.active { opacity:1; border-bottom-color:#fff; }
</style>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAMNJwqVc8M_2aH8oNvhPweDiAbaaxldGs",
    authDomain: "vinyl-vault-a3caf.firebaseapp.com",
    projectId: "vinyl-vault-a3caf",
    storageBucket: "vinyl-vault-a3caf.firebasestorage.app",
    messagingSenderId: "767586927963",
    appId: "1:767586927963:web:9065b444e64fba787b467e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "records");

  window._db = db; window._colRef = colRef;
  window._setDoc = setDoc; window._deleteDoc = deleteDoc; window._doc = doc;

  onSnapshot(colRef, (snapshot) => {
    window.collection = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('sync-status').innerHTML = '<i class="bi bi-cloud-check me-1"></i>Synced';
    document.getElementById('sync-status').className = 'me-3 text-success-emphasis small';
    refreshCurrentPage();
  }, (err) => {
    console.error(err);
    document.getElementById('sync-status').innerHTML = '<i class="bi bi-cloud-slash me-1"></i>Offline';
    document.getElementById('sync-status').className = 'me-3 text-warning small';
  });
</script>

<script>
  const DISCOGS_TOKEN = 'CTiNenmYdJnIcjFgIEqcyMiPghfZVjxsGsWHWvYH';
  window.collection = [];
  let currentView = 'grid';
  let currentPage = 'collection';
  let detailType = null;   // 'artist' | 'genre' | 'year'
  let detailValue = null;
  let prevPage = 'collection';
  let editingId = null;
  let bsModal = null;
  let bsToast = null;

  // ── Page routing ─────────────────────────────────────────
  function showPage(page) {
    if (page !== 'detail') prevPage = currentPage;
    currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    // Update nav active state
    ['collection','artists','genres','years'].forEach(p => {
      const el = document.getElementById('nav-' + p);
      if (el) el.classList.toggle('active', p === page);
    });
    refreshCurrentPage();
  }

  function goHome() { showPage('collection'); }

  function goBack() {
    showPage(prevPage);
  }

  function refreshCurrentPage() {
    const count = window.collection.length;
    document.getElementById('record-count-badge').textContent = count + ' Record' + (count !== 1 ? 's' : '');
    if (currentPage === 'collection') renderCollection();
    else if (currentPage === 'artists') renderArtists();
    else if (currentPage === 'genres') renderGenres();
    else if (currentPage === 'years') renderYears();
    else if (currentPage === 'detail') renderDetail();
  }

  function openDetail(type, value) {
    prevPage = currentPage;
    detailType = type;
    detailValue = value;
    showPage('detail');
  }

  // ── Collection page ──────────────────────────────────────
  function renderCollection() {
    const q = (document.getElementById('search').value || '').toLowerCase();
    const genreFilter = document.getElementById('filter-genre').value;
    const sortBy = document.getElementById('sort-by').value;

    let filtered = window.collection.filter(r => {
      const match = !q || r.artist.toLowerCase().includes(q) ||
        r.title.toLowerCase().includes(q) || (r.genre||'').toLowerCase().includes(q);
      return match && (!genreFilter || r.genre === genreFilter);
    });

    filtered.sort((a,b) => {
      if (sortBy==='artist') return a.artist.localeCompare(b.artist);
      if (sortBy==='title') return a.title.localeCompare(b.title);
      if (sortBy==='year-asc') return (a.year||9999)-(b.year||9999);
      if (sortBy==='year-desc') return (b.year||0)-(a.year||0);
      return (b.addedAt||0)-(a.addedAt||0);
    });

    updateGenreFilter();
    const el = document.getElementById('collection-content');

    if (window.collection.length === 0) {
      el.innerHTML = `<div class="text-center py-5">
        <i class="bi bi-vinyl empty-icon d-block mb-3"></i>
        <h4 class="text-muted">Your vault is empty</h4>
        <p class="text-muted mb-4">Search Discogs or add a record manually.</p>
        <button class="btn btn-primary" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i>Add Your First Record</button>
      </div>`;
      return;
    }
    if (filtered.length === 0) {
      el.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-search fs-3 d-block mb-2"></i>No records match your search.</div>`;
      return;
    }

    if (currentView === 'grid') {
      el.innerHTML = `<div class="grid-view">${filtered.map(gridCard).join('')}</div>`;
    } else {
      el.innerHTML = `<div class="card shadow-sm"><div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light"><tr>
            <th style="width:60px"></th><th>Artist</th><th>Album Title</th><th>Genre</th><th>Year</th><th style="width:90px"></th>
          </tr></thead>
          <tbody>${filtered.map(tableRow).join('')}</tbody>
        </table></div></div>`;
    }
  }

  function updateGenreFilter() {
    const genres = [...new Set(window.collection.map(r=>r.genre).filter(Boolean))].sort();
    const sel = document.getElementById('filter-genre');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All Genres</option>' +
      genres.map(g=>`<option value="${esc(g)}" ${g===cur?'selected':''}>${esc(g)}</option>`).join('');
  }

  // ── Artists page ─────────────────────────────────────────
  function renderArtists() {
    const q = (document.getElementById('artist-search').value || '').toLowerCase();
    const artistMap = {};
    window.collection.forEach(r => {
      const a = r.artist || 'Unknown';
      if (!artistMap[a]) artistMap[a] = [];
      artistMap[a].push(r);
    });

    let artists = Object.keys(artistMap).sort((a,b) => a.localeCompare(b));
    if (q) artists = artists.filter(a => a.toLowerCase().includes(q));

    const el = document.getElementById('artists-content');
    if (artists.length === 0) {
      el.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-person fs-3 d-block mb-2"></i>No artists found.</div>`;
      return;
    }

    el.innerHTML = `
      <p class="text-muted small mb-3">${artists.length} artist${artists.length!==1?'s':''}</p>
      <div class="browse-grid">
        ${artists.map(a => {
          const records = artistMap[a];
          const imgs = records.filter(r=>r.artwork).slice(0,4).map(r=>r.artwork);
          return `
            <div class="card shadow-sm browse-card" onclick="openDetail('artist','${esc(a)}')">
              ${mosaicHtml(imgs)}
              <div class="card-body py-2 px-3">
                <div class="fw-bold text-truncate">${esc(a)}</div>
                <div class="text-muted small">${records.length} album${records.length!==1?'s':''}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  // ── Genres page ──────────────────────────────────────────
  function renderGenres() {
    const genreMap = {};
    window.collection.forEach(r => {
      const g = r.genre || 'Uncategorized';
      if (!genreMap[g]) genreMap[g] = [];
      genreMap[g].push(r);
    });

    const genres = Object.keys(genreMap).sort((a,b) => a.localeCompare(b));
    const el = document.getElementById('genres-content');

    if (genres.length === 0) {
      el.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-tags fs-3 d-block mb-2"></i>No genres yet.</div>`;
      return;
    }

    el.innerHTML = `
      <p class="text-muted small mb-3">${genres.length} genre${genres.length!==1?'s':''}</p>
      <div class="browse-grid">
        ${genres.map(g => {
          const records = genreMap[g];
          const imgs = records.filter(r=>r.artwork).slice(0,4).map(r=>r.artwork);
          return `
            <div class="card shadow-sm browse-card" onclick="openDetail('genre','${esc(g)}')">
              ${mosaicHtml(imgs)}
              <div class="card-body py-2 px-3">
                <div class="fw-bold text-truncate">${esc(g)}</div>
                <div class="text-muted small">${records.length} album${records.length!==1?'s':''}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  // ── Years page ───────────────────────────────────────────
  function renderYears() {
    const yearMap = {};
    window.collection.forEach(r => {
      const y = r.year ? String(r.year) : 'Unknown';
      if (!yearMap[y]) yearMap[y] = [];
      yearMap[y].push(r);
    });

    const years = Object.keys(yearMap).sort((a,b) => {
      if (a==='Unknown') return 1; if (b==='Unknown') return -1;
      return parseInt(b) - parseInt(a);
    });
    const el = document.getElementById('years-content');

    if (years.length === 0) {
      el.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-calendar fs-3 d-block mb-2"></i>No years yet.</div>`;
      return;
    }

    el.innerHTML = `
      <p class="text-muted small mb-3">${years.length} year${years.length!==1?'s':''}</p>
      <div class="browse-grid">
        ${years.map(y => {
          const records = yearMap[y];
          const imgs = records.filter(r=>r.artwork).slice(0,4).map(r=>r.artwork);
          return `
            <div class="card shadow-sm browse-card" onclick="openDetail('year','${esc(y)}')">
              ${mosaicHtml(imgs)}
              <div class="card-body py-2 px-3">
                <div class="fw-bold">${esc(y)}</div>
                <div class="text-muted small">${records.length} album${records.length!==1?'s':''}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  // ── Detail page ──────────────────────────────────────────
  function renderDetail() {
    let records = window.collection;
    let breadcrumb = '';
    let title = '';

    if (detailType === 'artist') {
      records = window.collection.filter(r => r.artist === detailValue);
      breadcrumb = 'Artists';
      title = detailValue;
      document.getElementById('detail-back-btn').innerHTML = '<i class="bi bi-arrow-left me-1"></i>All Artists';
    } else if (detailType === 'genre') {
      records = window.collection.filter(r => (r.genre||'Uncategorized') === detailValue);
      breadcrumb = 'Genres';
      title = detailValue;
      document.getElementById('detail-back-btn').innerHTML = '<i class="bi bi-arrow-left me-1"></i>All Genres';
    } else if (detailType === 'year') {
      records = window.collection.filter(r => (r.year ? String(r.year) : 'Unknown') === detailValue);
      breadcrumb = 'Years';
      title = detailValue === 'Unknown' ? 'Unknown Year' : detailValue;
      document.getElementById('detail-back-btn').innerHTML = '<i class="bi bi-arrow-left me-1"></i>All Years';
    }

    records = records.slice().sort((a,b) => a.title.localeCompare(b.title));

    document.getElementById('detail-breadcrumb').textContent = breadcrumb + ' /';
    document.getElementById('detail-title').textContent = title + ' — ' + records.length + ' album' + (records.length!==1?'s':'');

    const el = document.getElementById('detail-content');
    if (records.length === 0) {
      el.innerHTML = `<div class="text-center py-5 text-muted">No records found.</div>`;
      return;
    }

    el.innerHTML = `<div class="grid-view">${records.map(r => gridCardDetail(r)).join('')}</div>`;
  }

  // Grid card for detail page — clicking opens edit modal
  function gridCardDetail(r) {
    const artHtml = r.artwork
      ? `<img src="${esc(r.artwork)}" alt="${esc(r.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    // In detail, show the "other" dimension as a clickable badge
    let extraBadges = '';
    if (detailType !== 'artist') extraBadges += `<span class="badge bg-primary clickable-badge me-1" onclick="event.stopPropagation();openDetail('artist','${esc(r.artist)}')">${esc(r.artist)}</span>`;
    if (detailType !== 'genre' && r.genre) extraBadges += `<span class="badge bg-secondary clickable-badge me-1" onclick="event.stopPropagation();openDetail('genre','${esc(r.genre)}')">${esc(r.genre)}</span>`;
    if (detailType !== 'year' && r.year) extraBadges += `<span class="badge bg-success clickable-badge" onclick="event.stopPropagation();openDetail('year','${r.year}')">${r.year}</span>`;

    return `
      <div class="card shadow-sm record-card position-relative h-100" onclick="openModal('${r.id}')">
        <div class="artwork-wrap">
          ${artHtml}
          <div class="artwork-placeholder" style="${r.artwork?'display:none':''}"><i class="bi bi-vinyl"></i></div>
        </div>
        <div class="card-body p-2">
          ${detailType !== 'artist' ? `<div class="text-primary small fw-semibold text-truncate">${esc(r.artist)}</div>` : ''}
          <div class="fw-bold text-truncate" style="font-size:.9rem">${esc(r.title)}</div>
          <div class="d-flex flex-wrap gap-1 mt-1">${extraBadges}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-sm btn-light border" onclick="event.stopPropagation();openModal('${r.id}')" title="Edit"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();confirmDelete('${r.id}')" title="Delete"><i class="bi bi-trash"></i></button>
        </div>
      </div>`;
  }

  // ── Grid / Table cards ───────────────────────────────────
  function gridCard(r) {
    const artHtml = r.artwork
      ? `<img src="${esc(r.artwork)}" alt="${esc(r.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    return `
      <div class="card shadow-sm record-card position-relative h-100" onclick="openModal('${r.id}')">
        <div class="artwork-wrap">
          ${artHtml}
          <div class="artwork-placeholder" style="${r.artwork?'display:none':''}"><i class="bi bi-vinyl"></i></div>
        </div>
        <div class="card-body p-2">
          <div class="text-primary small fw-semibold text-truncate clickable-artist"
            onclick="event.stopPropagation();openDetail('artist','${esc(r.artist)}')">${esc(r.artist)}</div>
          <div class="fw-bold text-truncate" style="font-size:.9rem">${esc(r.title)}</div>
          <div class="d-flex align-items-center gap-1 mt-1 flex-wrap">
            ${r.genre ? `<span class="badge bg-secondary clickable-badge" onclick="event.stopPropagation();openDetail('genre','${esc(r.genre)}')">${esc(r.genre)}</span>` : ''}
            ${r.year ? `<span class="text-muted ms-auto clickable-badge" style="font-size:.75rem" onclick="event.stopPropagation();openDetail('year','${r.year}')">${r.year}</span>` : ''}
          </div>
        </div>
        <div class="card-actions">
          <button class="btn btn-sm btn-light border" onclick="event.stopPropagation();openModal('${r.id}')" title="Edit"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();confirmDelete('${r.id}')" title="Delete"><i class="bi bi-trash"></i></button>
        </div>
      </div>`;
  }

  function tableRow(r) {
    const thumb = r.artwork
      ? `<img class="list-thumb" src="${esc(r.artwork)}" alt="${esc(r.title)}" onerror="this.outerHTML='<div class=list-thumb-placeholder><i class=bi-vinyl style=color:#adb5bd></i></div>'">`
      : `<div class="list-thumb-placeholder"><i class="bi bi-vinyl" style="color:#adb5bd"></i></div>`;
    return `
      <tr style="cursor:pointer" onclick="openModal('${r.id}')">
        <td>${thumb}</td>
        <td><span class="text-primary fw-semibold clickable-artist" onclick="event.stopPropagation();openDetail('artist','${esc(r.artist)}')">${esc(r.artist)}</span></td>
        <td class="fw-bold">${esc(r.title)}</td>
        <td>${r.genre ? `<span class="badge bg-secondary clickable-badge" onclick="event.stopPropagation();openDetail('genre','${esc(r.genre)}')">${esc(r.genre)}</span>` : '<span class="text-muted">—</span>'}</td>
        <td>${r.year ? `<span class="clickable-artist" onclick="event.stopPropagation();openDetail('year','${r.year}')">${r.year}</span>` : '<span class="text-muted">—</span>'}</td>
        <td onclick="event.stopPropagation()">
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary" onclick="openModal('${r.id}')"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete('${r.id}')"><i class="bi bi-trash"></i></button>
          </div>
        </td>
      </tr>`;
  }

  // ── Mosaic helper ────────────────────────────────────────
  function mosaicHtml(imgs) {
    const slots = [0,1,2,3].map(i => imgs[i]
      ? `<img src="${esc(imgs[i])}" onerror="this.style.display='none'" alt="">`
      : `<div class="blank"><i class="bi bi-vinyl"></i></div>`
    );
    return `<div class="browse-mosaic">${slots.join('')}</div>`;
  }

  // ── Discogs ──────────────────────────────────────────────
  async function searchDiscogs() {
    const query = document.getElementById('discogs-search').value.trim();
    if (!query) return;
    const btn = document.getElementById('discogs-btn');
    const resultsWrap = document.getElementById('discogs-results-wrap');
    const resultsEl = document.getElementById('discogs-results');
    const msgEl = document.getElementById('discogs-msg');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    btn.disabled = true;
    resultsWrap.style.display = 'none';
    msgEl.style.display = 'none';
    try {
      const res = await fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(query)}&type=release&per_page=8&token=${DISCOGS_TOKEN}`, { headers:{'User-Agent':'VinylVault/1.0'} });
      const data = await res.json();
      if (!data.results || data.results.length === 0) {
        msgEl.textContent = 'No results found. Try a different search.';
        msgEl.style.display = 'block';
      } else {
        resultsEl.innerHTML = data.results.map(r => {
          const artist = r.title.includes(' - ') ? r.title.split(' - ')[0] : (r.artist||'');
          const albumTitle = r.title.includes(' - ') ? r.title.split(' - ').slice(1).join(' - ') : r.title;
          const thumb = r.cover_image || r.thumb || '';
          const year = r.year || '';
          const genre = (r.genre&&r.genre[0]) || (r.style&&r.style[0]) || '';
          const label = r.label ? r.label[0] : '';
          return `<div class="discogs-result" onclick="fillFromDiscogs(${r.id},'${esc(artist)}','${esc(albumTitle)}','${year}','${esc(genre)}','${esc(thumb)}')">
            <img src="${esc(thumb)}" onerror="this.src=''" alt="">
            <div class="meta"><strong>${esc(albumTitle)}</strong><span>${esc(artist)}${year?' · '+year:''}${label?' · '+label:''}</span></div>
            <i class="bi bi-arrow-down-circle text-primary ms-auto"></i>
          </div>`;
        }).join('');
        resultsWrap.style.display = 'block';
      }
    } catch(e) {
      msgEl.textContent = 'Error connecting to Discogs. Check your connection and try again.';
      msgEl.style.display = 'block';
    }
    btn.innerHTML = '<i class="bi bi-search me-1"></i>Search';
    btn.disabled = false;
  }

  async function fillFromDiscogs(releaseId, artist, title, year, genre, thumbUrl) {
    document.getElementById('discogs-results-wrap').style.display = 'none';
    document.getElementById('f-artist').value = artist;
    document.getElementById('f-title').value = title;
    document.getElementById('f-year').value = year;
    document.getElementById('f-genre').value = genre;
    try {
      const res = await fetch(`https://api.discogs.com/releases/${releaseId}?token=${DISCOGS_TOKEN}`, { headers:{'User-Agent':'VinylVault/1.0'} });
      const data = await res.json();
      let artUrl = thumbUrl;
      if (data.images && data.images.length > 0) artUrl = data.images[0].uri || data.images[0].uri150 || thumbUrl;
      if (data.genres && data.genres.length > 0) document.getElementById('f-genre').value = data.genres[0];
      else if (data.styles && data.styles.length > 0) document.getElementById('f-genre').value = data.styles[0];
      if (data.year) document.getElementById('f-year').value = data.year;
      document.getElementById('f-artwork').value = artUrl;
      previewArtwork(artUrl);
    } catch(e) {
      document.getElementById('f-artwork').value = thumbUrl;
      previewArtwork(thumbUrl);
    }
    document.getElementById('discogs-search').value = '';
    document.getElementById('discogs-msg').style.display = 'none';
  }

  // ── Modal ────────────────────────────────────────────────
  function openModal(id) {
    editingId = id || null;
    const r = id ? window.collection.find(x => x.id === id) : null;
    document.getElementById('modal-title').textContent = r ? 'Edit Record' : 'Add Record';
    document.getElementById('btn-delete').style.display = r ? 'inline-block' : 'none';
    document.getElementById('edit-id').value = id || '';
    document.getElementById('f-artist').value = r ? r.artist : '';
    document.getElementById('f-title').value = r ? r.title : '';
    document.getElementById('f-year').value = r ? (r.year||'') : '';
    document.getElementById('f-genre').value = r ? (r.genre||'') : '';
    document.getElementById('f-artwork').value = r ? (r.artwork||'') : '';
    document.getElementById('discogs-search').value = '';
    document.getElementById('discogs-results-wrap').style.display = 'none';
    document.getElementById('discogs-msg').style.display = 'none';
    previewArtwork(r ? r.artwork : '');
    if (!bsModal) bsModal = new bootstrap.Modal(document.getElementById('recordModal'));
    bsModal.show();
    setTimeout(() => document.getElementById('discogs-search').focus(), 300);
  }

  function closeModal() { if (bsModal) bsModal.hide(); editingId = null; }

  function previewArtwork(url) {
    const img = document.getElementById('artwork-preview');
    const ph = document.getElementById('artwork-placeholder-box');
    if (url && (url.startsWith('http') || url.startsWith('//'))) {
      img.src = url; img.style.display = 'block'; ph.style.display = 'none';
      img.onerror = () => { img.style.display='none'; ph.style.display='flex'; };
    } else { img.style.display='none'; ph.style.display='flex'; }
  }

  // ── Save / Delete ────────────────────────────────────────
  async function saveRecord() {
    const artist = document.getElementById('f-artist').value.trim();
    const title = document.getElementById('f-title').value.trim();
    if (!artist || !title) { alert('Artist and Album Title are required.'); return; }
    const record = {
      artist, title,
      year: parseInt(document.getElementById('f-year').value) || null,
      genre: document.getElementById('f-genre').value.trim(),
      artwork: document.getElementById('f-artwork').value.trim(),
      addedAt: editingId ? (window.collection.find(x=>x.id===editingId)?.addedAt || Date.now()) : Date.now()
    };
    const id = editingId || (Date.now().toString(36) + Math.random().toString(36).slice(2));
    try {
      await window._setDoc(window._doc(window._colRef, id), record);
      showToast(editingId ? 'Record updated!' : 'Record added!');
      closeModal();
    } catch(e) { alert('Error saving: ' + e.message); }
  }

  function confirmDelete(id) { editingId = id; deleteRecord(); }

  async function deleteRecord() {
    const id = editingId || document.getElementById('edit-id').value;
    if (!id || !confirm('Remove this record from your vault?')) return;
    try {
      await window._deleteDoc(window._doc(window._colRef, id));
      showToast('Record deleted.', 'danger');
      closeModal();
    } catch(e) { alert('Error deleting: ' + e.message); }
  }

  // ── Helpers ──────────────────────────────────────────────
  function setView(v) {
    currentView = v;
    document.getElementById('btn-grid').className = v==='grid' ? 'btn btn-primary' : 'btn btn-outline-primary';
    document.getElementById('btn-list').className = v==='list' ? 'btn btn-primary' : 'btn btn-outline-primary';
    renderCollection();
  }

  function showToast(msg, type='success') {
    const el = document.getElementById('toast');
    el.className = `toast align-items-center text-bg-${type} border-0`;
    document.getElementById('toast-msg').textContent = msg;
    if (!bsToast) bsToast = new bootstrap.Toast(el, { delay:2500 });
    bsToast.show();
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  document.addEventListener('keydown', e => {
    if ((e.metaKey||e.ctrlKey) && e.key==='Enter') saveRecord();
  });

  // Expose globals
  window.showPage = showPage; window.goHome = goHome; window.goBack = goBack;
  window.openDetail = openDetail; window.openModal = openModal; window.closeModal = closeModal;
  window.saveRecord = saveRecord; window.deleteRecord = deleteRecord; window.confirmDelete = confirmDelete;
  window.setView = setView; window.renderCollection = renderCollection;
  window.renderArtists = renderArtists; window.renderGenres = renderGenres; window.renderYears = renderYears;
  window.searchDiscogs = searchDiscogs; window.fillFromDiscogs = fillFromDiscogs; window.previewArtwork = previewArtwork;
</script>
</body>
</html>
